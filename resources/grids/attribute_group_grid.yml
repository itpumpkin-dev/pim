datagrid:
  attribute_group_grid:
    source:
      type: eloquent
      class: App\Models\AttributeGroup
    columns:
      id:
        label: ID
        type: number
        sortable: true
      code:
        label: Code
        type: string
        sortable: true
      name:
        label: Name
        type: string
        sortable: true
    filters:
      global:
        type: string
        fields:
          - code
          - name
    actions:
      update:
        icon: edit
        label: Edit
      delete:
        icon: delete
        label: Delete
