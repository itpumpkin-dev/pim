datagrid:
  attribute_family_grid:
    source:
      type: eloquent
      class: App\Models\AttributeFamily
    columns:
      id:
        label: fields.id
        type: number
        sortable: true
      code:
        label: fields.code
        type: string
        sortable: true
      name:
        label: fields.name
        type: string
        sortable: true
    filters:
      global:
        type: string
        fields:
          - code
          - name
    actions:
      update:
        icon: edit
        label: rowActions.edit
      duplicate:
        icon: copy
        label: rowActions.duplicate
      delete:
        icon: delete
        label: rowActions.delete
