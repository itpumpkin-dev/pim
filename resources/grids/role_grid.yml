datagrid:
  role_grid:
    source:
      type: eloquent
      class: App\Models\Role
    columns:
      label:
        label: fields.label
        type: string
        sortable: true
    filters:
      global:
        type: string
        fields:
          - label
    actions:
      update:
        icon: edit
        label: rowActions.edit
      delete:
        icon: delete
        label: rowActions.delete
