datagrid:
  user_grid:
    source:
      type: eloquent
      class: App\Models\User
    columns:
      employee_id:
        label: fields.employeeId
        type: string
        sortable: true
      username:
        label: fields.username
        type: string
        sortable: true
      first_name:
        label: fields.firstName
        type: string
        sortable: true
      last_name:
        label: fields.lastName
        type: string
        sortable: true
      enabled:
        label: fields.status
        type: boolean
        sortable: true
    filters:
      global:
        type: string
        fields:
          - username
          - first_name
          - last_name
          - employee_id
    actions:
      update:
        icon: edit
        label: rowActions.edit
      # duplicate:
      #   icon: copy
      #   label: Duplicate
      delete:
        icon: delete
        label: rowActions.delete
