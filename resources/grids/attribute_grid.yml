datagrid:
  attribute_grid:
    source:
      type: eloquent
      class: App\Models\Attribute
    columns:
      code:
        label: Code
        type: string
        sortable: true
      name:
        label: Name
        type: string
        sortable: true
      type:
        label: Type
        type: string
        sortable: true
      is_required:
        label: Required
        type: boolean
        sortable: true
      is_unique:
        label: Unique
        type: boolean
        sortable: true
      is_locale_based:
        label: Locale Based
        type: boolean
        sortable: true
      is_channel_based:
        label: Channel Based
        type: boolean
        sortable: true
      created_at:
        label: Created At
        type: datetime
        sortable: true
    filters:
      global:
        type: string
        fields:
          - code
          - name
          - type
    actions:
      update:
        icon: edit
        label: Edit
      delete:
        icon: delete
        label: Delete
