datagrid:
  attribute_grid:
    source:
      type: eloquent
      class: App\Models\Attribute
    columns:
      code:
        label: fields.code
        type: string
        sortable: true
      name:
        label: fields.name
        type: string
        sortable: true
      type:
        label: fields.type
        type: string
        sortable: true
      is_required:
        label: fields.required
        type: boolean
        sortable: true
      is_unique:
        label: fields.unique
        type: boolean
        sortable: true
      is_locale_based:
        label: fields.localeBased
        type: boolean
        sortable: true
      is_channel_based:
        label: fields.channelBased
        type: boolean
        sortable: true
      created_at:
        label: fields.createdAt
        type: datetime
        sortable: true
    filters:
      global:
        type: string
        fields:
          - code
          - name
          - type
    actions:
      update:
        icon: edit
        label: rowActions.edit
      delete:
        icon: delete
        label: rowActions.delete
